name: Deploy www/ to GitHub Pages

# GitHub Pages "deploy from a branch" only allows the repo root or /docs.
# To serve from a custom folder (www/), we publish it via GitHub Actions instead.

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload www/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: www
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
